<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowBoard — Nova senha</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    body::before {
      content:''; position:fixed; inset:0; z-index:0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px; opacity:.35;
    }
    .wrap { position:relative; z-index:1; width:100%; max-width:400px; padding:20px; }
    .logo { font-family:var(--font-display); font-size:2rem; font-weight:800; color:var(--accent);
            text-align:center; margin-bottom:28px; }
    .logo span { color:var(--text); }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg);
            padding:28px; box-shadow:var(--shadow); animation:fadeUp .4s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">FLOW<span>BOARD</span></div>
  <div class="card">
    <h2 style="margin-bottom:6px">Nova senha</h2>
    <p class="text-muted text-sm" style="margin-bottom:20px">Escolha uma senha forte para sua conta.</p>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="input-group">
        <label>Nova senha</label>
        <input class="input" type="password" id="new-pwd" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="input-group">
        <label>Confirmar senha</label>
        <input class="input" type="password" id="confirm-pwd" placeholder="Repita a senha"
               onkeydown="if(event.key==='Enter') doReset()">
      </div>
      <button class="btn btn-primary" id="btn-reset" onclick="doReset()" style="justify-content:center">
        Redefinir senha
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/supabase.js"></script>
<script>
// Supabase redireciona aqui com hash #access_token=...
// O SDK detecta automaticamente e estabelece a sessão.
db.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    // Usuário está autenticado temporariamente para resetar a senha
    console.log('Pronto para redefinir senha');
  }
});

async function doReset() {
  const np = document.getElementById('new-pwd').value;
  const cp = document.getElementById('confirm-pwd').value;
  if (!np) { toast('Digite a nova senha', 'error'); return; }
  if (np.length < 6) { toast('Mínimo 6 caracteres', 'error'); return; }
  if (np !== cp) { toast('As senhas não coincidem', 'error'); return; }

  const btn = document.getElementById('btn-reset');
  btn.innerHTML = '<div class="spinner"></div> Salvando...';
  btn.style.pointerEvents = 'none';

  const { error } = await db.auth.updateUser({ password: np });
  if (error) {
    toast(error.message, 'error');
    btn.innerHTML = 'Redefinir senha';
    btn.style.pointerEvents = '';
    return;
  }
  toast('Senha redefinida com sucesso!', 'success');
  setTimeout(() => window.location.href = '/login.html', 1500);
}
</script>
</body>
</html>
